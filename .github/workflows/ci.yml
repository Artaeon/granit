name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: "1.24"
          cache: true

      - name: Build
        run: go build ./cmd/... ./internal/...

      - name: Verify binary
        run: |
          go build -o granit ./cmd/granit/
          ./granit version

      - name: Vet
        run: go vet ./cmd/... ./internal/...

      - name: Lint
        uses: golangci/golangci-lint-action@v6
        with:
          version: v1.64.5
          args: --timeout=5m ./cmd/... ./internal/...

      - name: Test
        run: go test ./cmd/... ./internal/...
