<svg xmlns="http://www.w3.org/2000/svg" width="800" height="500" viewBox="0 0 800 500">
  <defs>
    <style>
      @import url('https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;700&amp;display=swap');
      text { font-family: "JetBrains Mono", "Fira Code", "Cascadia Code", monospace; }
    </style>
  </defs>

  <!-- Window shadow -->
  <rect x="4" y="4" width="800" height="500" rx="10" fill="#000" opacity="0.3"/>

  <!-- Window background -->
  <rect width="800" height="500" rx="10" fill="#1e1e2e"/>

  <!-- Title bar -->
  <rect width="800" height="38" rx="10" fill="#181825"/>
  <rect y="28" width="800" height="10" fill="#181825"/>

  <!-- Traffic lights -->
  <circle cx="20" cy="19" r="6" fill="#f38ba8"/>
  <circle cx="40" cy="19" r="6" fill="#f9e2af"/>
  <circle cx="60" cy="19" r="6" fill="#a6e3a1"/>

  <!-- Title text -->
  <text x="400" y="23" text-anchor="middle" fill="#6c7086" font-size="12">granit ~/vault</text>

  <!-- Dimmed background content (editor behind overlay) -->
  <text x="60" y="60" fill="#313244" font-size="12">  1  ---</text>
  <text x="60" y="78" fill="#313244" font-size="12">  2  title: Project Notes</text>
  <text x="60" y="96" fill="#313244" font-size="12">  3  tags: [project, notes]</text>
  <text x="60" y="114" fill="#313244" font-size="12">  4  ---</text>
  <text x="60" y="132" fill="#313244" font-size="12">  5</text>
  <text x="60" y="150" fill="#313244" font-size="12">  6  # Project Notes</text>
  <text x="60" y="168" fill="#313244" font-size="12">  7</text>
  <text x="60" y="186" fill="#313244" font-size="12">  8  Working on the new feature...</text>
  <text x="60" y="350" fill="#313244" font-size="12"> 15  ## References</text>
  <text x="60" y="368" fill="#313244" font-size="12"> 16  - [[Research Notes]]</text>
  <text x="60" y="386" fill="#313244" font-size="12"> 17  - [[Architecture]]</text>
  <text x="60" y="404" fill="#313244" font-size="12"> 18</text>

  <!-- Command palette overlay -->
  <rect x="150" y="55" width="500" height="400" rx="10" fill="#181825" stroke="#313244" stroke-width="1.5"/>

  <!-- Search bar -->
  <rect x="165" y="70" width="470" height="36" rx="6" fill="#11111b" stroke="#45475a" stroke-width="1"/>
  <text x="180" y="93" fill="#cba6f7" font-size="14" font-weight="bold">&gt;</text>
  <text x="198" y="93" fill="#6c7086" font-size="13">Type a command...</text>
  <!-- Blinking cursor -->
  <rect x="340" y="79" width="2" height="18" fill="#cba6f7" opacity="0.8"/>

  <!-- Results count -->
  <text x="540" y="125" text-anchor="end" fill="#585b70" font-size="10">33 commands</text>

  <!-- Command list -->
  <!-- Item 1 - SELECTED -->
  <rect x="165" y="132" width="470" height="34" rx="4" fill="#cba6f7" opacity="0.12"/>
  <rect x="165" y="132" width="470" height="34" rx="4" fill="none" stroke="#cba6f7" stroke-width="1"/>
  <text x="185" y="154" fill="#a6e3a1" font-size="13">&#x1F4C4;</text>
  <text x="210" y="154" fill="#cdd6f4" font-size="12">New Note</text>
  <text x="560" y="154" text-anchor="end" fill="#cba6f7" font-size="10">Ctrl+N</text>

  <!-- Item 2 -->
  <rect x="165" y="170" width="470" height="34" rx="4" fill="#313244" opacity="0.5"/>
  <text x="185" y="192" fill="#89b4fa" font-size="13">&#x1F4BE;</text>
  <text x="210" y="192" fill="#cdd6f4" font-size="12">Save Note</text>
  <text x="560" y="192" text-anchor="end" fill="#585b70" font-size="10">Ctrl+S</text>

  <!-- Item 3 -->
  <rect x="165" y="208" width="470" height="34" rx="4" fill="#313244" opacity="0.5"/>
  <text x="185" y="230" fill="#f9e2af" font-size="13">&#x1F50D;</text>
  <text x="210" y="230" fill="#cdd6f4" font-size="12">Find in File</text>
  <text x="560" y="230" text-anchor="end" fill="#585b70" font-size="10">Ctrl+F</text>

  <!-- Item 4 -->
  <rect x="165" y="246" width="470" height="34" rx="4" fill="#313244" opacity="0.5"/>
  <text x="185" y="268" fill="#f38ba8" font-size="13">&#x1F5D1;</text>
  <text x="210" y="268" fill="#cdd6f4" font-size="12">Delete Note</text>
  <text x="560" y="268" text-anchor="end" fill="#585b70" font-size="10">Ctrl+D</text>

  <!-- Item 5 -->
  <rect x="165" y="284" width="470" height="34" rx="4" fill="#313244" opacity="0.5"/>
  <text x="185" y="306" fill="#cba6f7" font-size="13">&#x1F916;</text>
  <text x="210" y="306" fill="#cdd6f4" font-size="12">AI Bots</text>
  <text x="560" y="306" text-anchor="end" fill="#585b70" font-size="10">Ctrl+R</text>

  <!-- Item 6 -->
  <rect x="165" y="322" width="470" height="34" rx="4" fill="#313244" opacity="0.5"/>
  <text x="185" y="344" fill="#94e2d5" font-size="13">&#x1F3A8;</text>
  <text x="210" y="344" fill="#cdd6f4" font-size="12">Change Theme</text>
  <text x="560" y="344" text-anchor="end" fill="#585b70" font-size="10">Ctrl+,</text>

  <!-- Item 7 -->
  <rect x="165" y="360" width="470" height="34" rx="4" fill="#313244" opacity="0.5"/>
  <text x="185" y="382" fill="#fab387" font-size="13">&#x1F4CA;</text>
  <text x="210" y="382" fill="#cdd6f4" font-size="12">Vault Statistics</text>
  <text x="560" y="382" text-anchor="end" fill="#585b70" font-size="10"></text>

  <!-- Item 8 -->
  <rect x="165" y="398" width="470" height="34" rx="4" fill="#313244" opacity="0.5"/>
  <text x="185" y="420" fill="#74c7ec" font-size="13">&#x1F4C5;</text>
  <text x="210" y="420" fill="#cdd6f4" font-size="12">Calendar</text>
  <text x="560" y="420" text-anchor="end" fill="#585b70" font-size="10">Ctrl+L</text>

  <!-- Scroll indicator -->
  <rect x="628" y="132" width="3" height="320" rx="2" fill="#313244"/>
  <rect x="628" y="132" width="3" height="120" rx="2" fill="#45475a"/>

  <!-- Footer hint -->
  <text x="400" y="448" text-anchor="middle" fill="#45475a" font-size="10">&#x2191;&#x2193; navigate  Enter select  Esc close</text>

  <!-- Status bar -->
  <rect x="0" y="470" width="800" height="30" fill="#11111b"/>
  <rect x="0" y="490" width="800" height="10" rx="10" fill="#11111b"/>
  <text x="20" y="490" fill="#585b70" font-size="11">Command Palette</text>
  <text x="680" y="490" fill="#cba6f7" font-size="11">Ctrl+X</text>
</svg>