  <!-- Blank line -->
  <!-- Line 6: Heading -->
  <text x="58" y="166" fill="#cba6f7" font-size="13" font-weight="bold"># Getting Started with Granit</text>

  <!-- Blank line -->
  <!-- Line 8: Paragraph -->
  <text x="58" y="202" fill="#cdd6f4" font-size="13">Granit is a terminal-based knowledge manager built</text>
  <text x="58" y="220" fill="#cdd6f4" font-size="13">with Go and Bubble Tea. It supports </text>
  <text x="314" y="220" fill="#89dceb" font-size="13">**vim keybindings**</text>
  <text x="58" y="238" fill="#cdd6f4" font-size="13">for efficient text editing.</text>

  <!-- Blank line -->
  <!-- Line 12: Subheading -->
  <text x="58" y="274" fill="#f9e2af" font-size="13" font-weight="bold">## Key Features</text>

  <!-- Cursor block on line 13 -->
  <rect x="58" y="262" width="8" height="16" fill="#cba6f7" opacity="0.7"/>

  <!-- Blank line -->
  <!-- List items -->
  <text x="58" y="310" fill="#f38ba8" font-size="13">-</text>
  <text x="72" y="310" fill="#cdd6f4" font-size="13">Modal editing (Normal / Insert / Visual)</text>
  <text x="58" y="328" fill="#f38ba8" font-size="13">-</text>
  <text x="72" y="328" fill="#cdd6f4" font-size="13">Wikilinks with </text>
  <text x="186" y="328" fill="#89b4fa" font-size="13">[[autocomplete]]</text>
  <text x="58" y="346" fill="#f38ba8" font-size="13">-</text>
  <text x="72" y="346" fill="#cdd6f4" font-size="13">28 built-in color themes</text>
  <text x="58" y="364" fill="#f38ba8" font-size="13">-</text>
  <text x="72" y="364" fill="#cdd6f4" font-size="13">AI-powered bots (Ollama / OpenAI)</text>
  <text x="58" y="382" fill="#f38ba8" font-size="13">-</text>
  <text x="72" y="382" fill="#cdd6f4" font-size="13">Plugin system with script hooks</text>

  <!-- Blank line -->
  <!-- Code block -->
  <text x="58" y="418" fill="#585b70" font-size="13">```bash</text>
  <rect x="55" y="424" width="500" height="18" rx="3" fill="#11111b"/>
  <text x="62" y="438" fill="#a6e3a1" font-size="13">granit open ~/vault</text>
  <text x="58" y="456" fill="#585b70" font-size="13">```</text>

