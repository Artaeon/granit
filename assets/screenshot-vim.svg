  <text x="94" y="76" fill="#585b70" font-size="13">:</text>
  <text x="106" y="76" fill="#a6e3a1" font-size="13">Getting Started with Granit</text>
  <text x="58" y="94" fill="#89b4fa" font-size="13">tags</text>
  <text x="88" y="94" fill="#585b70" font-size="13">:</text>
