  <text x="25" y="232" fill="#cdd6f4" font-size="12">Implement PDF export</text>
  <text x="25" y="250" fill="#585b70" font-size="10">#export  #feature</text>
  <rect x="195" y="240" width="48" height="16" rx="3" fill="#f9e2af" opacity="0.15"/>
  <text x="219" y="251" text-anchor="middle" fill="#f9e2af" font-size="9">Mar 12</text>

