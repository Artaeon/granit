  <rect x="15" y="274" width="237" height="72" rx="6" fill="#313244" stroke="#45475a" stroke-width="1"/>
  <text x="25" y="294" fill="#f38ba8" font-size="11">&#x1F53A; High</text>
  <text x="25" y="312" fill="#cdd6f4" font-size="12">Fix sidebar scroll issue</text>
  <text x="25" y="330" fill="#585b70" font-size="10">#bug  #sidebar</text>
  <rect x="195" y="320" width="48" height="16" rx="3" fill="#f38ba8" opacity="0.15"/>
  <text x="219" y="331" text-anchor="middle" fill="#f38ba8" font-size="9">Mar 09</text>

  <!-- IN PROGRESS cards -->
  <!-- Card 1 -->
  <rect x="282" y="114" width="237" height="72" rx="6" fill="#313244" stroke="#cba6f7" stroke-width="1.5"/>
  <text x="292" y="134" fill="#f9e2af" font-size="11">&#x1F53C; Medium</text>
  <text x="292" y="152" fill="#cdd6f4" font-size="12">Refactor theme system</text>
  <text x="292" y="170" fill="#585b70" font-size="10">#themes  #refactor</text>
  <rect x="462" y="160" width="48" height="16" rx="3" fill="#cba6f7" opacity="0.2"/>
  <text x="486" y="171" text-anchor="middle" fill="#cba6f7" font-size="9">WIP</text>

  <!-- Card 2 -->
  <rect x="282" y="194" width="237" height="72" rx="6" fill="#313244" stroke="#45475a" stroke-width="1"/>
  <text x="292" y="214" fill="#f38ba8" font-size="11">&#x1F53A; High</text>
  <text x="292" y="232" fill="#cdd6f4" font-size="12">Add vim keybindings</text>
  <text x="292" y="250" fill="#585b70" font-size="10">#vim  #editor</text>
  <rect x="462" y="240" width="48" height="16" rx="3" fill="#f9e2af" opacity="0.15"/>
  <text x="486" y="251" text-anchor="middle" fill="#f9e2af" font-size="9">60%</text>

  <!-- DONE cards -->
  <!-- Card 1 -->
  <rect x="549" y="114" width="237" height="72" rx="6" fill="#313244" stroke="#a6e3a1" stroke-width="1" opacity="0.7"/>
  <text x="559" y="134" fill="#a6e3a1" font-size="11">&#x2705; Complete</text>
  <text x="559" y="152" fill="#a6adc8" font-size="12" text-decoration="line-through">Setup CI pipeline</text>
  <text x="559" y="170" fill="#585b70" font-size="10">#devops  #ci</text>

  <!-- Card 2 -->
  <rect x="549" y="194" width="237" height="72" rx="6" fill="#313244" stroke="#a6e3a1" stroke-width="1" opacity="0.7"/>
  <text x="559" y="214" fill="#a6e3a1" font-size="11">&#x2705; Complete</text>
  <text x="559" y="232" fill="#a6adc8" font-size="12" text-decoration="line-through">Design splash screen</text>
  <text x="559" y="250" fill="#585b70" font-size="10">#ui  #design</text>

  <!-- Footer / status bar -->
  <rect x="0" y="460" width="800" height="40" rx="0" fill="#11111b"/>
  <rect x="0" y="490" width="800" height="10" rx="10" fill="#11111b"/>
  <text x="20" y="484" fill="#585b70" font-size="11">n new  e edit  d done  &#x2190;&#x2192; move  / filter  q quit</text>
  <text x="680" y="484" fill="#cba6f7" font-size="11">Ctrl+T Tasks</text>
</svg>