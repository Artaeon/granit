  <rect x="220" y="83" width="28" height="16" rx="8" fill="#f38ba8" opacity="0.2"/>
  <text x="234" y="95" text-anchor="middle" fill="#f38ba8" font-size="10">3</text>

  <!-- In Progress -->
  <rect x="277" y="78" width="247" height="26" rx="4" fill="#45475a"/>
  <text x="340" y="96" fill="#f9e2af" font-size="12" font-weight="bold">IN PROGRESS</text>
  <rect x="487" y="83" width="28" height="16" rx="8" fill="#f9e2af" opacity="0.2"/>
  <text x="501" y="95" text-anchor="middle" fill="#f9e2af" font-size="10">2</text>

  <!-- Done -->
  <rect x="544" y="78" width="247" height="26" rx="4" fill="#45475a"/>
  <text x="630" y="96" fill="#a6e3a1" font-size="12" font-weight="bold">DONE</text>
  <rect x="754" y="83" width="28" height="16" rx="8" fill="#a6e3a1" opacity="0.2"/>
  <text x="768" y="95" text-anchor="middle" fill="#a6e3a1" font-size="10">2</text>

  <!-- TO DO cards -->
  <!-- Card 1 -->
  <rect x="15" y="114" width="237" height="72" rx="6" fill="#313244" stroke="#45475a" stroke-width="1"/>
  <text x="25" y="134" fill="#f38ba8" font-size="11">&#x1F53A; High</text>
  <text x="25" y="152" fill="#cdd6f4" font-size="12">Write plugin documentation</text>
  <text x="25" y="170" fill="#585b70" font-size="10">#docs  #plugins</text>
  <rect x="195" y="160" width="48" height="16" rx="3" fill="#f38ba8" opacity="0.15"/>
  <text x="219" y="171" text-anchor="middle" fill="#f38ba8" font-size="9">Mar 10</text>

  <!-- Card 2 -->
  <rect x="15" y="194" width="237" height="72" rx="6" fill="#313244" stroke="#45475a" stroke-width="1"/>
