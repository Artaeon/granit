<svg xmlns="http://www.w3.org/2000/svg" width="800" height="500" viewBox="0 0 800 500">
  <defs>
    <style>
      @import url('https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;700&amp;display=swap');
      text { font-family: "JetBrains Mono", "Fira Code", "Cascadia Code", monospace; }
    </style>
  </defs>

  <!-- Window shadow -->
  <rect x="4" y="4" width="800" height="500" rx="10" fill="#000" opacity="0.3"/>

  <!-- Window background -->
  <rect width="800" height="500" rx="10" fill="#1e1e2e"/>

  <!-- Title bar -->
  <rect width="800" height="38" rx="10" fill="#181825"/>
  <rect y="28" width="800" height="10" fill="#181825"/>

  <!-- Traffic lights -->
  <circle cx="20" cy="19" r="6" fill="#f38ba8"/>
  <circle cx="40" cy="19" r="6" fill="#f9e2af"/>
  <circle cx="60" cy="19" r="6" fill="#a6e3a1"/>

  <!-- Title text -->
  <text x="400" y="23" text-anchor="middle" fill="#6c7086" font-size="12">granit ~/vault</text>

  <!-- Dimmed background content (simulating editor behind overlay) -->
  <text x="20" y="60" fill="#313244" font-size="12"># Research Notes</text>
  <text x="20" y="78" fill="#313244" font-size="12">Some background text that is</text>
  <text x="20" y="96" fill="#313244" font-size="12">dimmed behind the overlay...</text>
  <text x="20" y="132" fill="#313244" font-size="12">## Key Findings</text>
  <text x="20" y="150" fill="#313244" font-size="12">- Item one goes here</text>
  <text x="20" y="168" fill="#313244" font-size="12">- Item two goes here</text>

  <!-- Overlay backdrop -->
  <rect x="120" y="50" width="560" height="420" rx="8" fill="#181825" stroke="#313244" stroke-width="1.5"/>

  <!-- Overlay header -->
  <rect x="120" y="50" width="560" height="40" rx="8" fill="#11111b"/>
  <rect x="120" y="82" width="560" height="8" fill="#11111b"/>
  <text x="150" y="76" fill="#cba6f7" font-size="14" font-weight="bold">AI Bots</text>
  <text x="222" y="76" fill="#6c7086" font-size="14">(Ollama)</text>

  <!-- Status indicator -->
  <circle cx="630" cy="71" r="5" fill="#a6e3a1"/>
  <text x="640" y="75" fill="#a6e3a1" font-size="10">Connected</text>

  <!-- Model info -->
  <text x="150" y="106" fill="#585b70" font-size="10">Model: mistral:7b  |  Provider: Ollama  |  http://localhost:11434</text>

  <!-- Bot list -->
  <!-- Bot 1 -->
  <rect x="135" y="116" width="530" height="36" rx="4" fill="#313244"/>
  <text x="155" y="138" fill="#f9e2af" font-size="13">&#x1F3F7;&#xFE0F;  Auto-Tagger</text>
  <text x="400" y="138" fill="#6c7086" font-size="11">Generate tags from note content</text>

  <!-- Bot 2 - SELECTED -->
  <rect x="135" y="156" width="530" height="36" rx="4" fill="#cba6f7" opacity="0.15"/>
  <rect x="135" y="156" width="530" height="36" rx="4" fill="none" stroke="#cba6f7" stroke-width="1.5"/>
  <text x="155" y="178" fill="#cba6f7" font-size="13">&#x1F517;  Link Suggester</text>
  <text x="400" y="178" fill="#a6adc8" font-size="11">Find related notes to link</text>
  <text x="635" y="178" fill="#cba6f7" font-size="10">&#x25C0;</text>

  <!-- Bot 3 -->
  <rect x="135" y="196" width="530" height="36" rx="4" fill="#313244"/>
  <text x="155" y="218" fill="#89b4fa" font-size="13">&#x1F4DD;  Summarizer</text>
  <text x="400" y="218" fill="#6c7086" font-size="11">Create concise note summaries</text>

  <!-- Bot 4 -->
  <rect x="135" y="236" width="530" height="36" rx="4" fill="#313244"/>
  <text x="155" y="258" fill="#a6e3a1" font-size="13">&#x2753;  Question Bot</text>
  <text x="400" y="258" fill="#6c7086" font-size="11">Ask questions about your notes</text>

  <!-- Bot 5 -->
  <rect x="135" y="276" width="530" height="36" rx="4" fill="#313244"/>
  <text x="155" y="298" fill="#f38ba8" font-size="13">&#x270D;&#xFE0F;  Writing Assistant</text>
  <text x="400" y="298" fill="#6c7086" font-size="11">Help improve your writing</text>

  <!-- Bot 6 -->
  <rect x="135" y="316" width="530" height="36" rx="4" fill="#313244"/>
  <text x="155" y="338" fill="#fab387" font-size="13">&#x1F4A1;  Title Suggester</text>
  <text x="400" y="338" fill="#6c7086" font-size="11">Suggest better note titles</text>

  <!-- Bot 7 -->
  <rect x="135" y="356" width="530" height="36" rx="4" fill="#313244"/>
  <text x="155" y="378" fill="#94e2d5" font-size="13">&#x2705;  Action Items</text>
  <text x="400" y="378" fill="#6c7086" font-size="11">Extract tasks and action items</text>

  <!-- Bot 8 -->
  <rect x="135" y="396" width="530" height="36" rx="4" fill="#313244"/>
  <text x="155" y="418" fill="#74c7ec" font-size="13">&#x1F5FA;&#xFE0F;  MOC Generator</text>
  <text x="400" y="418" fill="#6c7086" font-size="11">Generate Maps of Content</text>

  <!-- Bot 9 -->
  <rect x="135" y="436" width="530" height="36" rx="4" fill="#313244"/>
  <text x="155" y="458" fill="#f5c2e7" font-size="13">&#x2600;&#xFE0F;  Daily Digest</text>
  <text x="400" y="458" fill="#6c7086" font-size="11">Summarize daily activity</text>

  <!-- Footer / status bar -->
  <rect x="0" y="475" width="800" height="25" rx="0" fill="#11111b"/>
  <rect x="0" y="490" width="800" height="10" rx="10" fill="#11111b"/>
  <text x="20" y="492" fill="#585b70" font-size="11">&#x2191;&#x2193; select  Enter run  Tab config  Esc close</text>
  <text x="680" y="492" fill="#cba6f7" font-size="11">Ctrl+R Bots</text>
</svg>