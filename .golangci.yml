linters:
  enable:
    - govet
    - staticcheck
    - ineffassign
    - unused
    - errcheck
  disable:
    - depguard

linters-settings:
  errcheck:
    exclude-functions:
      - (io.Closer).Close
      - (net/http.ResponseWriter).Write
  staticcheck:
    checks:
      - all
      - "-SA1019" # allow deprecated APIs during gradual migration
      - "-ST1005" # allow capitalized error strings
      - "-QF1003" # skip tagged switch suggestions
      - "-QF1001" # skip De Morgan's law suggestions
      - "-S1016"  # skip struct conversion suggestions
      - "-S1005"  # skip blank identifier suggestions
      - "-S1009"  # skip nil slice len suggestions
      - "-S1039"  # skip unnecessary Sprintf suggestions

run:
  timeout: 5m

issues:
  max-issues-per-linter: 50
  max-same-issues: 5
