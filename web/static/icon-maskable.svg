<!-- Maskable variant for Android adaptive icons. The OS crops the
     icon to its own circle/squircle/rounded-square shape, so:
       - background is full-bleed (no rounded corners on our side)
       - the mark fits within the centered 80% safe area (Android
         spec: anything outside the central 80% radius can be
         clipped). Our stone is shrunk by ~25% from the standalone
         icon and re-centered.

     Numbers chosen so the mark sits inside a centered 410px-wide
     box on the 512px canvas, leaving 51px of breathing room on each
     side — comfortable margin for any reasonable mask shape.

     Same 4-facet geometry as icon.svg + same prefers-color-scheme
     swap (taken seriously by the few launchers that actually
     respect it; most bake the dark PNG variant anyway). -->
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <style>
    .bg { fill: #0a0a0a; }
    .fg { stroke: #fafafa; }
    .cap-fill { fill: #16161a; }
    @media (prefers-color-scheme: light) {
      .bg { fill: #fafafa; }
      .fg { stroke: #0a0a0a; }
      .cap-fill { fill: #ededf0; }
    }
  </style>
  <rect class="bg" width="512" height="512"/>
  <polygon class="cap-fill" points="256,128 396,214 116,214"/>
  <g class="fg" fill="none" stroke-width="28" stroke-linejoin="round" stroke-linecap="round">
    <path d="M 256 128 L 396 214 L 396 354 L 256 414 L 116 354 L 116 214 Z"/>
    <path d="M 116 214 L 396 214"/>
    <path d="M 256 128 L 256 214"/>
    <path d="M 256 214 L 256 414"/>
  </g>
</svg>
