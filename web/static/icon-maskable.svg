<!-- Maskable variant for Android adaptive icons. The OS crops the
     icon to its own circle/squircle/rounded-square shape, so:
       - background is full-bleed (no rounded corners on our side)
       - the mark fits within the centered 80% safe area (Android
         spec: anything outside the central 80% radius can be
         clipped)

     The G is centered + scaled to ~70% of the canvas so even an
     aggressive circular crop preserves the whole letter. The
     mason-wedge notch is dropped here intentionally — it would
     sit OUTSIDE the safe area and most adaptive masks would clip
     it anyway. The bare G in the centered safe-area reads as the
     same brand without the asymmetric signature; mask shape
     becomes the signature here, which is what the maskable spec
     is designed for.

     Color scheme matches the system. -->
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <style>
    .bg { fill: #0a0a0a; }
    .letter { fill: #fafafa; }
    @media (prefers-color-scheme: light) {
      .bg { fill: #fafafa; }
      .letter { fill: #0a0a0a; }
    }
  </style>
  <rect class="bg" width="512" height="512"/>
  <!-- G centered + scaled to ~70% canvas = ~360px wide, sitting in
       a 410-wide safe-area box (51px breathing room each side).
       Coordinates picked so the letter is geometrically centered
       on (256, 256). -->
  <path class="letter" d="
    M 156 152
    L 356 152
    L 356 222
    L 226 222
    L 226 332
    L 296 332
    L 296 294
    L 246 294
    L 246 252
    L 356 252
    L 356 392
    L 156 392
    Z"/>
</svg>
