<!-- Granit logo — Monogram G with stone-mason wedge.
     A chiseled G constructed entirely from straight strokes (no
     curves) so it reads as "carved into stone" rather than "set
     in type". The notch in the bottom-right corner of the slab is
     the differentiator — a mason's wedge cut, gives the silhouette
     character no other G logo has AND remains identifiable at the
     16px favicon size where the notch is the only thing the eye
     can resolve.

     Color scheme is responsive via inline CSS: dark default, light
     swap when the browser context prefers light. PNG renderings
     bake the dark variant (manifest icons are single-mode on
     iOS/Android). Browser tabs + supported OS surfaces use the SVG
     and therefore get the live theme swap.

     Geometry uses absolute coordinates for clean diffs. The G is
     drawn as a single filled path so the inner counter (white space
     inside) and outer silhouette are inseparable; the notch is a
     subtractive polygon filled with the backdrop color. -->
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" role="img" aria-label="Granit">
  <style>
    .bg { fill: #0a0a0a; }
    .letter { fill: #fafafa; }
    .notch { fill: #0a0a0a; }
    @media (prefers-color-scheme: light) {
      .bg { fill: #fafafa; }
      .letter { fill: #0a0a0a; }
      .notch { fill: #fafafa; }
    }
  </style>
  <rect class="bg" width="512" height="512" rx="96"/>
  <!-- The G, drawn as a single fill path. Geometry: a left bar
       (width 88) running the full height, a top bar across the
       width, a bottom bar across the width, and an interior
       crossbar jutting INTO the counter to form the classic
       G-spur. Stroke widths are tuned so the letter remains
       legible from 16px favicon to 512px install icon. -->
  <path class="letter" d="
    M 130 96
    L 382 96
    L 382 184
    L 218 184
    L 218 328
    L 312 328
    L 312 280
    L 250 280
    L 250 224
    L 382 224
    L 382 416
    L 130 416
    Z"/>
  <!-- Mason's wedge notch — a 45° cut in the bottom-right corner
       of the slab. Reads as "stone hewn from a larger block" and
       gives the silhouette an asymmetric signature. -->
  <polygon class="notch" points="512,416 512,512 416,512"/>
</svg>
