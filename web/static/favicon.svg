<!-- Favicon: Monogram G, scaled + thickened for 16/32px browser-
     tab rendering. Different viewBox + thicker letter widths than
     icon.svg so the silhouette stays confident at favicon scale —
     a 1:1 downscale of the 512 master would dissolve into mush at
     16px because the counters disappear.

     Mason-wedge notch in the bottom-right corner survives at this
     scale and remains the differentiator vs. other G-logo favicons.

     Dark default + light swap via prefers-color-scheme so the
     favicon doesn't look stranded on a light browser chrome. -->
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" role="img" aria-label="Granit">
  <style>
    .bg { fill: #0a0a0a; }
    .letter { fill: #fafafa; }
    .notch { fill: #0a0a0a; }
    @media (prefers-color-scheme: light) {
      .bg { fill: #fafafa; }
      .letter { fill: #0a0a0a; }
      .notch { fill: #fafafa; }
    }
  </style>
  <rect class="bg" width="32" height="32" rx="5"/>
  <!-- Simplified G at 32px. Coordinates picked so the letter remains
       readable down to 16px (where each unit is half a pixel). The
       crossbar is intentionally short — at this scale a full inner
       crossbar would close the counter and read as a square; the
       short stub still cues "G" without losing legibility. -->
  <path class="letter" d="
    M 8 6
    L 24 6
    L 24 11
    L 13.5 11
    L 13.5 20.5
    L 19 20.5
    L 19 18
    L 15.5 18
    L 15.5 14
    L 24 14
    L 24 26
    L 8 26
    Z"/>
  <!-- Mason-wedge notch — bottom-right corner of the slab. -->
  <polygon class="notch" points="32,26 32,32 26,32"/>
</svg>
