<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <link rel="icon" href="%sveltekit.assets%/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
    <meta name="theme-color" content="#1a1b26" />
    <link rel="manifest" href="%sveltekit.assets%/manifest.webmanifest" />
    <link rel="apple-touch-icon" href="%sveltekit.assets%/icon.svg" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="Granit" />
    <meta name="mobile-web-app-capable" content="yes" />
    <title>Granit</title>
    <!-- Theme bootstrap: runs before paint to avoid the dark → light flash
         when the user prefers light. Reads the same localStorage key the
         theme store uses; falls back to OS preference. -->
    <script>
      (function () {
        try {
          var t = localStorage.getItem('granit.theme') || 'system';
          var e =
            t === 'dark'
              ? 'dark'
              : t === 'light'
                ? 'light'
                : matchMedia('(prefers-color-scheme: light)').matches
                  ? 'light'
                  : 'dark';
          document.documentElement.setAttribute('data-theme', e);
          var meta = document.querySelector('meta[name="theme-color"]');
          if (meta) meta.setAttribute('content', e === 'light' ? '#eff1f5' : '#1a1b26');
        } catch (_) {}
      })();
    </script>
    %sveltekit.head%
  </head>
  <body data-sveltekit-preload-data="hover" class="bg-base text-text antialiased">
    <div style="display: contents">%sveltekit.body%</div>
  </body>
</html>
