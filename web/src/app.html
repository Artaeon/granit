<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <link rel="icon" type="image/svg+xml" href="%sveltekit.assets%/favicon.svg" />
    <link rel="icon" type="image/png" sizes="192x192" href="%sveltekit.assets%/icon-192.png" />
    <link rel="icon" type="image/png" sizes="512x512" href="%sveltekit.assets%/icon-512.png" />
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
    <!-- Pair of theme-color meta tags — one per color scheme — so the
         browser chrome (Android status bar, desktop title bar, PWA
         splash) tints correctly in both modes. The bootstrap script
         below overwrites the theme-color at runtime once it knows the
         user's stored preference; these static defaults are what the
         OS sees pre-paint (and what installed-PWA app-switchers cache). -->
    <meta name="theme-color" content="#000000" media="(prefers-color-scheme: dark)" />
    <meta name="theme-color" content="#ffffff" media="(prefers-color-scheme: light)" />
    <!-- color-scheme tells the browser our UA defaults render well on
         both. Drives the default scrollbar / form-control palette so
         a light-mode user doesn't get a dark scrollbar on first paint. -->
    <meta name="color-scheme" content="dark light" />
    <link rel="manifest" href="%sveltekit.assets%/manifest.webmanifest" />
    <!-- iOS doesn't read manifest icons. apple-touch-icon must be PNG;
         180×180 is the universal size that scales cleanly to every iOS
         device. Older fallback link kept identical for older iOS. -->
    <link rel="apple-touch-icon" href="%sveltekit.assets%/apple-touch-icon.png" />
    <link rel="apple-touch-icon" sizes="180x180" href="%sveltekit.assets%/apple-touch-icon.png" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="Granit" />
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="application-name" content="Granit" />
    <title>Granit</title>
    <!-- Theme bootstrap: runs before paint to avoid the dark → light flash
         when the user prefers light. Reads the same localStorage key the
         theme store uses; falls back to OS preference. -->
    <script>
      (function () {
        try {
          var t = localStorage.getItem('granit.theme') || 'system';
          var e =
            t === 'dark'
              ? 'dark'
              : t === 'light'
                ? 'light'
                : matchMedia('(prefers-color-scheme: light)').matches
                  ? 'light'
                  : 'dark';
          document.documentElement.setAttribute('data-theme', e);
          var meta = document.querySelector('meta[name="theme-color"]');
          if (meta) meta.setAttribute('content', e === 'light' ? '#ffffff' : '#000000');
        } catch (_) {}
      })();
    </script>
    %sveltekit.head%
  </head>
  <body data-sveltekit-preload-data="hover" class="bg-base text-text antialiased">
    <!-- Pre-hydration splash. Visible the instant the document parses
         until the SPA's root component mounts and sets
         data-app-ready on <html> (done in +layout.svelte's onMount).
         Mirrors the installed-app icon exactly: same 4-facet stone
         with per-facet tonal fills + stroke outline, so what the user
         sees on launch looks like the icon they tapped — not a
         hollow outline. The indeterminate bar gives a single liveness
         cue without dominating the screen. -->
    <div id="app-splash" aria-hidden="true">
      <div class="app-splash__center">
        <svg viewBox="0 0 512 512" width="72" height="72" aria-hidden="true" class="app-splash__icon">
          <!-- Per-facet fills — match icon.svg / icon-maskable.svg
               so the splash never reads as just a wire-outline. The
               tonal direction inverts via prefers-color-scheme (see
               style block below). -->
          <polygon class="app-splash__facet-cl" points="256,76 256,184 80,184" />
          <polygon class="app-splash__facet-cr" points="256,76 432,184 256,184" />
          <polygon class="app-splash__facet-bl" points="80,184 256,184 256,436 80,360" />
          <polygon class="app-splash__facet-br" points="256,184 432,184 432,360 256,436" />
          <g fill="none" stroke="currentColor" stroke-width="32" stroke-linejoin="round" stroke-linecap="round">
            <path d="M 256 76 L 432 184 L 432 360 L 256 436 L 80 360 L 80 184 Z" />
            <path d="M 80 184 L 432 184" />
            <path d="M 256 76 L 256 184" />
            <path d="M 256 184 L 256 436" />
          </g>
        </svg>
        <div class="app-splash__title">Granit</div>
        <div class="app-splash__bar"><div class="app-splash__bar-fill"></div></div>
      </div>
    </div>
    <style>
      #app-splash {
        position: fixed;
        inset: 0;
        z-index: 9999;
        display: flex;
        align-items: center;
        justify-content: center;
        background: #000;
        color: #eee;
        font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif;
      }
      [data-theme='light'] #app-splash {
        background: #fff;
        color: #111;
      }
      [data-app-ready] #app-splash {
        display: none;
      }
      .app-splash__center {
        text-align: center;
        display: flex;
        flex-direction: column;
        align-items: center;
        gap: 1.25rem;
      }
      /* Per-facet fills, dark mode default. Mirror icon.svg's tonal
         direction (light from upper-left) so the launch screen looks
         like the same gemstone the user just tapped. */
      .app-splash__facet-cl { fill: #2c2c34; }
      .app-splash__facet-cr { fill: #1c1c22; }
      .app-splash__facet-bl { fill: #14141a; }
      .app-splash__facet-br { fill: #0d0d12; }
      [data-theme='light'] .app-splash__facet-cl { fill: #d8d8e0; }
      [data-theme='light'] .app-splash__facet-cr { fill: #e4e4ec; }
      [data-theme='light'] .app-splash__facet-bl { fill: #eeeef4; }
      [data-theme='light'] .app-splash__facet-br { fill: #f5f5f9; }
      .app-splash__title {
        font-size: 0.875rem;
        letter-spacing: 0.32em;
        text-transform: uppercase;
        font-weight: 600;
        opacity: 0.85;
      }
      .app-splash__bar {
        width: 120px;
        height: 2px;
        background: rgba(127, 127, 127, 0.18);
        overflow: hidden;
      }
      .app-splash__bar-fill {
        width: 30%;
        height: 100%;
        background: currentColor;
        opacity: 0.65;
        animation: app-splash-slide 1.2s ease-in-out infinite;
      }
      @keyframes app-splash-slide {
        0% { transform: translateX(-120%); }
        100% { transform: translateX(440%); }
      }
      @media (prefers-reduced-motion: reduce) {
        .app-splash__bar-fill {
          animation: none;
          width: 100%;
          opacity: 0.4;
        }
      }
    </style>
    <div style="display: contents">%sveltekit.body%</div>
  </body>
</html>
